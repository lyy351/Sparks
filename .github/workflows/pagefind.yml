name: Build and Index
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install -g pagefind
      - name: Build Jekyll site
        run: |
          gem install bundler
          bundle install
          bundle exec jekyll build
      - name: Run Pagefind
        run: npx pagefind --site _site --output-path _site/pagefind
      - name: Upload pagefind folder
        uses: actions/upload-artifact@v4
        with:
          name: pagefind
          path: _site/pagefind
      - name: Commit pagefind folder back to repo
        run: |
          cp -r _site/pagefind ./pagefind
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pagefind/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update pagefind index"
          git push
