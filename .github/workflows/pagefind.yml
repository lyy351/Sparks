name: Build and Index
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史，便于处理冲突
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Gemfile
        run: |
          echo "source 'https://rubygems.org'" > Gemfile
          echo "gem 'github-pages', group: :jekyll_plugins" >> Gemfile
          echo "gem 'jekyll-paginate'" >> Gemfile

      - name: Install Ruby dependencies
        run: bundle install

      - name: Install pagefind
        run: npm install -g pagefind

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Run Pagefind
        run: npx pagefind --site _site --output-path _site/pagefind
  
      - name: Upload pagefind folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagefind
          path: _site/pagefind

      - name: Commit pagefind folder back to repo
        run: |
          # 复制生成的 pagefind 文件夹到工作区根目录
          cp -r _site/pagefind ./pagefind
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pagefind/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update pagefind index"
            # 先拉取远程最新更改并合并，避免推送冲突
            git pull --no-rebase origin master || echo "Pull failed, will attempt push anyway"
            # 再次尝试推送，如果仍然失败，使用安全的强制推送（--force-with-lease）
            git push || git push --force-with-lease
          fi
