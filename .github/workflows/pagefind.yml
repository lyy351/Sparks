name: Build and Index
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # 自动安装并缓存 bundle 依赖
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Gemfile
        run: |
          echo "source 'https://rubygems.org'" > Gemfile
          echo "gem 'github-pages', group: :jekyll_plugins" >> Gemfile
          echo "gem 'jekyll-paginate'" >> Gemfile
          echo "gem 'jekyll'" >> Gemfile   # 显式添加 jekyll，确保可执行文件存在

      - name: Install Ruby dependencies
        run: |
          bundle install
          bundle exec jekyll -v   # 测试 jekyll 是否可用

      - name: Install pagefind
        run: npm install -g pagefind@latest

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Run Pagefind
        run: npx pagefind --site _site --output-path _site/pagefind --glob "**/20*/*.html"

      - name: Upload pagefind folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pagefind
          path: _site/pagefind

      - name: Commit pagefind folder back to repo
        run: |
          cp -r _site/pagefind ./pagefind
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pagefind/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update pagefind index"
            git pull --no-rebase origin master || echo "Pull failed, will attempt push anyway"
            git push || git push --force-with-lease
          fi
